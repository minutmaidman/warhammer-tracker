<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warhammer Roster Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg:        #0d0b0e;
  --bg2:       #141118;
  --bg3:       #1c1824;
  --surface:   #211d2d;
  --surface2:  #2a2538;
  --border:    #3a3248;
  --border2:   #4e4468;
  --gold:      #c9a84c;
  --gold2:     #e8c96a;
  --gold3:     #f5e0a0;
  --red:       #9b2335;
  --red2:      #c0392b;
  --green:     #2d7a4f;
  --green2:    #3daa6e;
  --text:      #e8e0d0;
  --text2:     #b8aaa0;
  --text3:     #7a7080;
  --accent:    #7b4fbf;
  --accent2:   #9d70e0;
  --shadow:    rgba(0,0,0,0.6);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 17px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(123,79,191,0.12) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.012) 39px, rgba(255,255,255,0.012) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.012) 39px, rgba(255,255,255,0.012) 40px);
}
h1,h2,h3,h4 { font-family: 'Cinzel', serif; letter-spacing: 0.05em; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* Layout */
#root { min-height: 100vh; display: flex; flex-direction: column; }
.app-header {
  padding: 1.2rem 2rem;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(201,168,76,0.06) 0%, transparent 100%);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(8px);
}
.app-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.5rem; font-weight: 900;
  color: var(--gold2);
  text-shadow: 0 0 30px rgba(201,168,76,0.4);
  letter-spacing: 0.12em;
}
.app-title span { color: var(--text3); font-size: 0.85rem; font-family: 'Cinzel', serif; font-weight: 400; letter-spacing: 0.2em; display: block; }

.main-layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 57px); }

/* Sidebar */
.sidebar {
  width: 260px; min-width: 260px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 1rem 1rem 0.75rem;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h3 {
  font-size: 0.75rem; letter-spacing: 0.25em; color: var(--gold);
  text-transform: uppercase; margin-bottom: 0.6rem;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
  padding: 0.5rem 1rem; border-radius: 3px; border: none; cursor: pointer;
  font-family: 'Cinzel', serif; font-size: 0.82rem; letter-spacing: 0.1em;
  font-weight: 600; transition: all 0.15s; text-transform: uppercase;
}
.btn-gold {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  color: #1a1410; width: 100%;
}
.btn-gold:hover { filter: brightness(1.12); transform: translateY(-1px); }
.btn-ghost {
  background: transparent; color: var(--text2); border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--border2); color: var(--text); background: var(--surface); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: var(--red2); }
.btn-sm { padding: 0.35rem 0.75rem; font-size: 0.75rem; }
.btn-icon { padding: 0.35rem; border-radius: 3px; background: transparent; border: 1px solid var(--border); color: var(--text3); cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; }
.btn-icon:hover { border-color: var(--gold); color: var(--gold); }
.btn-icon.danger:hover { border-color: var(--red); color: var(--red); }

.list-scroll { overflow-y: auto; flex: 1; padding: 0.5rem; }
.list-item {
  padding: 0.65rem 0.75rem; border-radius: 4px; cursor: pointer;
  margin-bottom: 0.25rem; transition: all 0.12s;
  border: 1px solid transparent;
  position: relative;
}
.list-item:hover { background: var(--surface); border-color: var(--border); }
.list-item.active {
  background: var(--surface2); border-color: var(--gold);
  box-shadow: 0 0 12px rgba(201,168,76,0.15);
}
.list-item-name {
  font-family: 'Cinzel', serif; font-size: 0.88rem; font-weight: 600;
  color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.list-item.active .list-item-name { color: var(--gold2); }
.list-item-meta { font-size: 0.78rem; color: var(--text3); margin-top: 0.2rem; display: flex; gap: 0.5rem; }
.badge {
  display: inline-flex; align-items: center;
  padding: 0.1rem 0.4rem; border-radius: 2px; font-size: 0.72rem;
  font-family: 'Cinzel', serif; letter-spacing: 0.05em; font-weight: 600;
}
.badge-40k { background: rgba(155,35,53,0.25); color: #e06070; border: 1px solid rgba(155,35,53,0.4); }
.badge-aos { background: rgba(45,122,79,0.25); color: #5dd4a0; border: 1px solid rgba(45,122,79,0.4); }
.badge-warn { background: rgba(200,140,0,0.2); color: var(--gold2); border: 1px solid rgba(200,140,0,0.4); }
.badge-over { background: rgba(155,35,53,0.3); color: #ff8090; border: 1px solid rgba(155,35,53,0.5); }
.badge-ok { background: rgba(45,122,79,0.2); color: #5dd4a0; border: 1px solid rgba(45,122,79,0.4); }

/* Main content */
.main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

/* KPI bar */
.kpi-bar {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: var(--border);
  border-bottom: 1px solid var(--border);
}
.kpi-card {
  background: var(--bg2); padding: 1rem 1.25rem;
  display: flex; flex-direction: column; gap: 0.25rem;
}
.kpi-label { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--text3); text-transform: uppercase; font-family: 'Cinzel', serif; }
.kpi-value { font-family: 'Cinzel', serif; font-size: 1.7rem; font-weight: 700; color: var(--gold2); line-height: 1; }
.kpi-value.warn { color: #f5a623; }
.kpi-value.over { color: var(--red2); }
.kpi-sub { font-size: 0.8rem; color: var(--text3); }

/* Progress bar */
.prog-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-top: 0.3rem; }
.prog-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

/* Toolbar */
.toolbar {
  padding: 0.75rem 1.25rem; display: flex; align-items: center; gap: 0.75rem;
  border-bottom: 1px solid var(--border); background: var(--bg2);
  flex-wrap: wrap;
}
.toolbar-title { font-family: 'Cinzel', serif; font-size: 1.15rem; font-weight: 700; color: var(--gold2); flex: 1; }
.toolbar-title input {
  background: transparent; border: none; outline: none;
  font-family: 'Cinzel', serif; font-size: 1.15rem; font-weight: 700; color: var(--gold2);
  width: 100%; cursor: pointer;
}
.toolbar-title input:focus { border-bottom: 1px solid var(--gold); cursor: text; }

/* Search / filters */
.search-row {
  padding: 0.75rem 1.25rem; display: flex; gap: 0.75rem; flex-wrap: wrap;
  border-bottom: 1px solid var(--border); align-items: center;
}
.input {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 0.45rem 0.75rem; border-radius: 3px;
  font-family: 'Crimson Pro', serif; font-size: 1rem; outline: none;
  transition: border-color 0.15s;
}
.input:focus { border-color: var(--gold); }
.input::placeholder { color: var(--text3); }
.input-search { flex: 1; min-width: 200px; }
.select {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 0.45rem 0.75rem; border-radius: 3px;
  font-family: 'Crimson Pro', serif; font-size: 0.97rem; outline: none;
  cursor: pointer; transition: border-color 0.15s;
}
.select:focus { border-color: var(--gold); }

/* Unit table */
.table-wrap { flex: 1; overflow: auto; padding: 1.25rem; }
.unit-table { width: 100%; border-collapse: collapse; }
.unit-table th {
  font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.15em;
  color: var(--text3); text-transform: uppercase; text-align: left;
  padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.unit-table th.num { text-align: right; }
.unit-table td { padding: 0.55rem 0.75rem; border-bottom: 1px solid rgba(58,50,72,0.5); vertical-align: middle; }
.unit-table tr { transition: background 0.1s; }
.unit-table tr:hover td { background: rgba(42,37,56,0.5); }
.unit-table tr.warn-row td { background: rgba(200,120,0,0.04); }
.unit-table tr.err-row td { background: rgba(155,35,53,0.08); }
.td-name { font-family: 'Cinzel', serif; font-size: 0.9rem; font-weight: 600; }
.td-name a { color: var(--gold); text-decoration: none; }
.td-name a:hover { color: var(--gold2); text-decoration: underline; }
.td-role { font-size: 0.8rem; color: var(--text3); }
.td-num { text-align: right; font-size: 0.92rem; font-variant-numeric: tabular-nums; }
.td-actions { text-align: right; white-space: nowrap; }

/* Inline number input */
.num-input {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); padding: 0.3rem 0.4rem; border-radius: 3px;
  font-size: 0.92rem; width: 56px; text-align: center; outline: none;
  font-variant-numeric: tabular-nums;
}
.num-input:focus { border-color: var(--gold); }
.num-input.err { border-color: var(--red); }

/* Paint % pill */
.paint-pct {
  display: inline-flex; align-items: center; gap: 0.3rem;
  font-size: 0.86rem; font-variant-numeric: tabular-nums;
  min-width: 60px; justify-content: flex-end;
}

/* Tier selector */
.tier-select {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); padding: 0.3rem 0.5rem; border-radius: 3px;
  font-size: 0.85rem; outline: none; cursor: pointer;
}
.tier-select:focus { border-color: var(--gold); }

/* Empty state */
.empty-state {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1rem; padding: 4rem 2rem; color: var(--text3); text-align: center;
}
.empty-icon { font-size: 3rem; opacity: 0.3; }
.empty-state h2 { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--text2); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; backdrop-filter: blur(4px);
}
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; padding: 2rem; width: 480px; max-width: 95vw;
  box-shadow: 0 24px 64px rgba(0,0,0,0.7);
  animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { transform: scale(0.95) translateY(-8px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal h2 { font-size: 1.1rem; color: var(--gold2); margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; }
.form-row { margin-bottom: 1rem; }
.form-row label { display: block; font-size: 0.72rem; letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase; font-family: 'Cinzel', serif; margin-bottom: 0.35rem; }
.form-row .input, .form-row .select { width: 100%; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; justify-content: flex-end; }
.divider { height: 1px; background: var(--border); margin: 1rem 0; }

/* Unit search dropdown */
.unit-search-wrap { position: relative; }
.unit-dropdown {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 300;
  background: var(--bg2); border: 1px solid var(--border2);
  border-top: none; border-radius: 0 0 4px 4px; max-height: 220px; overflow-y: auto;
}
.unit-dropdown-item {
  padding: 0.55rem 0.75rem; cursor: pointer; transition: background 0.1s;
  display: flex; justify-content: space-between; align-items: center;
}
.unit-dropdown-item:hover { background: var(--surface2); }
.unit-dropdown-item-name { font-family: 'Cinzel', serif; font-size: 0.88rem; color: var(--text); }
.unit-dropdown-item-meta { font-size: 0.78rem; color: var(--text3); }

/* No list selected */
.no-list { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; color: var(--text3); }
.no-list h2 { font-family: 'Cinzel', serif; color: var(--text2); font-size: 1.35rem; }
.no-list p { font-size: 1rem; max-width: 300px; text-align: center; line-height: 1.6; }

/* Notification toast */
.toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 500;
  background: var(--surface2); border: 1px solid var(--border2);
  border-left: 3px solid var(--gold); padding: 0.75rem 1.25rem;
  border-radius: 4px; font-size: 0.95rem; color: var(--text);
  animation: toastIn 0.2s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.toast.err { border-left-color: var(--red2); }
@keyframes toastIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }

/* Points fill indicator */
.pts-bar-wrap { margin-top: 0.35rem; display: flex; align-items: center; gap: 0.5rem; }
.pts-fill-bar { flex: 1; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.pts-fill-inner { height: 100%; transition: width 0.4s, background 0.4s; border-radius: 2px; }

@media (max-width: 900px) {
  .sidebar { width: 200px; min-width: 200px; }
  .kpi-bar { grid-template-columns: repeat(2,1fr); }
}
</style>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── Helpers ──────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,10);
const clamp = (v,mn,mx) => Math.min(mx, Math.max(mn, v||0));

function paintColor(pct) {
  if (pct <= 0) return '#9b2335';
  if (pct >= 100) return '#3daa6e';
  const r = pct < 50
    ? [155, 35, 53, 220, 120, 0]
    : [220, 120, 0, 61, 170, 110];
  const t = pct < 50 ? pct/50 : (pct-50)/50;
  const [r1,g1,b1,r2,g2,b2] = r;
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

function ptsFillColor(pct) {
  if (pct < 80) return '#3daa6e';
  if (pct < 100) return '#f5a623';
  return '#c0392b';
}

const LS_KEY = 'wh_roster_v1';
function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || { lists: [], activeId: null }; }
  catch { return { lists: [], activeId: null }; }
}
function saveState(s) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch {}
}

const DATA = window.UNITS_DATA;
const ALL_UNITS = DATA.units;
const GAME_SYSTEMS = DATA.gameSystems;
const FACTIONS = DATA.factions;

// ── Sub-components ────────────────────────────────────────────────────────────
function Toast({ msg, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
  return <div className={`toast${type==='err'?' err':''}`}>{msg}</div>;
}

function PaintPct({ pct }) {
  const c = paintColor(pct);
  return (
    <span className="paint-pct">
      <span style={{width:36,height:6,background:'#1c1824',borderRadius:3,display:'inline-block',overflow:'hidden'}}>
        <span style={{width:`${pct}%`,height:'100%',background:c,display:'block',transition:'width 0.3s'}}/>
      </span>
      <span style={{color:c,minWidth:34,textAlign:'right'}}>{pct.toFixed(0)}%</span>
    </span>
  );
}

function UnitSearchInput({ gameSystem, factionId, onSelect }) {
  const [q, setQ] = useState('');
  const [open, setOpen] = useState(false);
  const ref = useRef();

  const results = useMemo(() => {
    if (!q.trim() || q.length < 2) return [];
    const lo = q.toLowerCase();
    return ALL_UNITS
      .filter(u => u.gameSystem === gameSystem && u.factionId === factionId && u.name.toLowerCase().includes(lo))
      .slice(0, 30);
  }, [q, gameSystem, factionId]);

  useEffect(() => {
    function handle(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', handle);
    return () => document.removeEventListener('mousedown', handle);
  }, []);

  return (
    <div className="unit-search-wrap" ref={ref}>
      <input className="input" style={{width:'100%'}} placeholder="Search unit name…"
        value={q} onChange={e=>{ setQ(e.target.value); setOpen(true); }}
        onFocus={()=>setOpen(true)}/>
      {open && results.length > 0 && (
        <div className="unit-dropdown">
          {results.map(u=>(
            <div key={u.id} className="unit-dropdown-item" onMouseDown={()=>{ onSelect(u); setQ(''); setOpen(false); }}>
              <span className="unit-dropdown-item-name">{u.name}</span>
              <span className="unit-dropdown-item-meta">{u.role} · {u.basePoints}pts · {u.baseModelCount}m</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Add Unit Modal ────────────────────────────────────────────────────────────
function AddUnitModal({ list, onAdd, onClose }) {
  const [mode, setMode] = useState('search'); // 'search' | 'manual'
  const [selected, setSelected] = useState(null);
  const [tierIdx, setTierIdx] = useState(0);
  const [qty, setQty] = useState(1);
  const [manual, setManual] = useState({ name:'', points:'', modelCount:'', msrp:'' });

  const factionUnits = useMemo(() =>
    ALL_UNITS.filter(u => u.gameSystem === list.gameSystem && u.factionId === list.factionId),
    [list.gameSystem, list.factionId]
  );

  function handleAdd() {
    if (mode === 'search' && selected) {
      const tier = selected.tiers[tierIdx] || selected.tiers[0];
      onAdd({
        id: uid(), unitId: selected.id, name: selected.name,
        role: selected.role, wahapediaUrl: selected.wahapediaUrl,
        points: tier.points, baseModelCount: tier.models,
        tierIdx, tiers: selected.tiers,
        qty: clamp(qty,1,99),
        msrpCAD: selected.msrpCAD,
        acquired: 0, built: 0, primed: 0, painted: 0
      });
      onClose();
    } else if (mode === 'manual') {
      if (!manual.name.trim()) return;
      const pts = parseInt(manual.points)||0;
      const mc = parseInt(manual.modelCount)||1;
      onAdd({
        id: uid(), unitId: null, name: manual.name.trim(),
        role: 'Manual Entry', wahapediaUrl: '',
        points: pts, baseModelCount: mc,
        tierIdx: 0, tiers: [{models:mc, points:pts}],
        qty: clamp(qty,1,99),
        msrpCAD: manual.msrp ? parseFloat(manual.msrp) : null,
        acquired:0, built:0, primed:0, painted:0
      });
      onClose();
    }
  }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <h2>Add Unit to Roster</h2>
        <div style={{display:'flex',gap:'0.5rem',marginBottom:'1rem'}}>
          <button className={`btn btn-sm ${mode==='search'?'btn-gold':'btn-ghost'}`} onClick={()=>setMode('search')}>Search Database</button>
          <button className={`btn btn-sm ${mode==='manual'?'btn-gold':'btn-ghost'}`} onClick={()=>setMode('manual')}>Manual Entry</button>
        </div>

        {mode === 'search' ? (
          <>
            <div className="form-row">
              <label>Unit Name</label>
              <UnitSearchInput gameSystem={list.gameSystem} factionId={list.factionId}
                onSelect={u=>{ setSelected(u); setTierIdx(0); }}/>
            </div>
            {selected && (
              <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:4,padding:'0.75rem',marginBottom:'1rem'}}>
                <div style={{fontFamily:'Cinzel,serif',fontSize:'0.85rem',color:'var(--gold2)',marginBottom:'0.35rem'}}>{selected.name}</div>
                <div style={{fontSize:'0.75rem',color:'var(--text3)',marginBottom:'0.5rem'}}>{selected.factionName} · {selected.role}</div>
                {selected.tiers.length > 1 && (
                  <div className="form-row" style={{marginBottom:'0.5rem'}}>
                    <label>Unit Size Tier</label>
                    <select className="tier-select" value={tierIdx} onChange={e=>setTierIdx(+e.target.value)} style={{width:'100%'}}>
                      {selected.tiers.map((t,i)=>(
                        <option key={i} value={i}>{t.models} model{t.models>1?'s':''} — {t.points} pts</option>
                      ))}
                    </select>
                  </div>
                )}
                {selected.tiers.length === 1 && (
                  <div style={{fontSize:'0.78rem',color:'var(--text2)'}}>
                    {selected.tiers[0].models} model{selected.tiers[0].models>1?'s':''} · {selected.tiers[0].points} pts
                  </div>
                )}
              </div>
            )}
            {!selected && factionUnits.length === 0 && (
              <div style={{fontSize:'0.8rem',color:'var(--text3)',marginBottom:'1rem'}}>No database entries for this faction — use Manual Entry.</div>
            )}
          </>
        ) : (
          <>
            <div className="form-row">
              <label>Unit Name</label>
              <input className="input" style={{width:'100%'}} value={manual.name}
                onChange={e=>setManual(p=>({...p,name:e.target.value}))} placeholder="e.g. Kurnoth Hunters"/>
            </div>
            <div className="form-row-2">
              <div className="form-row" style={{marginBottom:0}}>
                <label>Points</label>
                <input className="input" type="number" min="0" value={manual.points}
                  onChange={e=>setManual(p=>({...p,points:e.target.value}))} placeholder="0"/>
              </div>
              <div className="form-row" style={{marginBottom:0}}>
                <label>Models / Unit</label>
                <input className="input" type="number" min="1" value={manual.modelCount}
                  onChange={e=>setManual(p=>({...p,modelCount:e.target.value}))} placeholder="1"/>
              </div>
            </div>
            <div className="form-row" style={{marginTop:'0.75rem'}}>
              <label>MSRP (CAD) — Optional</label>
              <input className="input" style={{width:'100%'}} type="number" min="0" step="0.01"
                value={manual.msrp} onChange={e=>setManual(p=>({...p,msrp:e.target.value}))} placeholder="0.00"/>
            </div>
          </>
        )}

        <div className="form-row">
          <label>Quantity (how many times in this list)</label>
          <input className="input" type="number" min="1" max="99" value={qty}
            onChange={e=>setQty(+e.target.value)} style={{width:'80px'}}/>
        </div>

        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-gold" onClick={handleAdd}>Add to Roster</button>
        </div>
      </div>
    </div>
  );
}

// ── New List Modal ────────────────────────────────────────────────────────────
function NewListModal({ onSave, onClose }) {
  const [name, setName] = useState('');
  const [system, setSystem] = useState('wh40k');
  const [factionKey, setFactionKey] = useState('');
  const [pointsCap, setPointsCap] = useState(2000);

  const factionOpts = useMemo(() =>
    Object.entries(FACTIONS)
      .filter(([,f])=>f.gameSystem===system)
      .sort((a,b)=>a[1].name.localeCompare(b[1].name)),
    [system]
  );
  useEffect(()=>{ setFactionKey(factionOpts[0]?.[0]||''); }, [factionOpts]);

  function handleSave() {
    if (!name.trim() || !factionKey) return;
    const faction = FACTIONS[factionKey];
    onSave({
      id: uid(), name: name.trim(),
      gameSystem: system,
      factionId: faction.id,
      factionName: faction.name,
      pointsCap: +pointsCap||2000,
      units: [], createdAt: Date.now()
    });
    onClose();
  }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <h2>Create New Army List</h2>
        <div className="form-row">
          <label>List Name</label>
          <input className="input" style={{width:'100%'}} value={name}
            onChange={e=>setName(e.target.value)} placeholder="e.g. 2000pt Sylvaneth — Tournament"/>
        </div>
        <div className="form-row-2">
          <div className="form-row" style={{marginBottom:0}}>
            <label>Game System</label>
            <select className="select" value={system} onChange={e=>setSystem(e.target.value)} style={{width:'100%'}}>
              <option value="wh40k">Warhammer 40,000</option>
              <option value="aos">Age of Sigmar</option>
            </select>
          </div>
          <div className="form-row" style={{marginBottom:0}}>
            <label>Points Cap</label>
            <input className="input" type="number" min="250" max="10000" step="250"
              value={pointsCap} onChange={e=>setPointsCap(e.target.value)} style={{width:'100%'}}/>
          </div>
        </div>
        <div className="form-row" style={{marginTop:'0.75rem'}}>
          <label>Faction</label>
          <select className="select" value={factionKey} onChange={e=>setFactionKey(e.target.value)} style={{width:'100%'}}>
            {factionOpts.map(([k,f])=><option key={k} value={k}>{f.name}</option>)}
          </select>
        </div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-gold" onClick={handleSave}>Create List</button>
        </div>
      </div>
    </div>
  );
}

// ── Edit MSRP Modal ───────────────────────────────────────────────────────────
function MsrpModal({ entry, onSave, onClose }) {
  const [val, setVal] = useState(entry.msrpCAD != null ? String(entry.msrpCAD) : '');
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{width:320}}>
        <h2>Set MSRP (CAD)</h2>
        <div style={{fontSize:'0.85rem',color:'var(--text2)',marginBottom:'1rem'}}>{entry.name}</div>
        <input className="input" style={{width:'100%'}} type="number" min="0" step="0.01"
          value={val} onChange={e=>setVal(e.target.value)} placeholder="0.00" autoFocus/>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-gold" onClick={()=>{ onSave(val===''?null:parseFloat(val)); onClose(); }}>Save</button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [state, setState] = useState(loadState);
  const [showNewList, setShowNewList] = useState(false);
  const [showAddUnit, setShowAddUnit] = useState(false);
  const [msrpEntry, setMsrpEntry] = useState(null);
  const [toast, setToast] = useState(null);
  const [search, setSearch] = useState('');
  const fileRef = useRef();

  useEffect(()=>{ saveState(state); }, [state]);

  const activeList = useMemo(()=> state.lists.find(l=>l.id===state.activeId)||null, [state]);

  function setActiveId(id) { setState(s=>({...s,activeId:id})); }

  function addList(list) {
    setState(s=>({...s, lists:[...s.lists, list], activeId:list.id}));
    showToast(`"${list.name}" created`);
  }

  function deleteList(id) {
    setState(s=>{
      const lists = s.lists.filter(l=>l.id!==id);
      return {...s, lists, activeId: lists.length ? (s.activeId===id ? lists[0].id : s.activeId) : null};
    });
    showToast('List deleted', 'err');
  }

  function updateListName(id, name) {
    setState(s=>({...s, lists:s.lists.map(l=>l.id===id?{...l,name}:l)}));
  }

  function addUnit(entry) {
    setState(s=>({...s, lists:s.lists.map(l=>l.id===s.activeId?{...l,units:[...l.units,entry]}:l)}));
    showToast(`${entry.name} added`);
  }

  function updateUnit(listId, entryId, patch) {
    setState(s=>({...s, lists:s.lists.map(l=>l.id!==listId?l:{
      ...l, units:l.units.map(u=>u.id!==entryId?u:{...u,...patch})
    })}));
  }

  function removeUnit(listId, entryId) {
    setState(s=>({...s, lists:s.lists.map(l=>l.id!==listId?l:{
      ...l, units:l.units.filter(u=>u.id!==entryId)
    })}));
  }

  function showToast(msg, type='ok') {
    setToast({msg,type,key:uid()});
  }

  // Export
  function exportList() {
    if (!activeList) return;
    const blob = new Blob([JSON.stringify(activeList, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${activeList.name.replace(/[^a-z0-9]/gi,'_')}.json`;
    a.click();
    showToast('List exported');
  }

  // Import
  function importList(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const list = JSON.parse(ev.target.result);
        if (!list.id || !list.units) throw new Error();
        list.id = uid(); // avoid collision
        setState(s=>({...s, lists:[...s.lists,list], activeId:list.id}));
        showToast(`"${list.name}" imported`);
      } catch { showToast('Invalid list file', 'err'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  // KPIs
  const kpis = useMemo(()=>{
    if (!activeList) return null;
    const cap = activeList.pointsCap || 2000;
    const totalPts = activeList.units.reduce((s,u)=>s+u.points*u.qty,0);
    const totalModels = activeList.units.reduce((s,u)=>s+u.baseModelCount*u.qty,0);
    const totalMsrp = activeList.units.reduce((s,u)=>s+(u.msrpCAD||0)*u.qty,0);
    const totalPainted = activeList.units.reduce((s,u)=>s+clamp(u.painted,0,u.baseModelCount*u.qty),0);
    const paintPct = totalModels>0 ? (totalPainted/totalModels)*100 : 0;
    const ptsPct = cap>0 ? (totalPts/cap)*100 : 0;
    return { totalPts, totalModels, totalMsrp, paintPct, ptsPct, cap,
      ptsStatus: totalPts > cap ? 'over' : totalPts > cap*0.9 ? 'warn' : 'ok' };
  }, [activeList]);

  const filteredUnits = useMemo(()=>{
    if (!activeList) return [];
    if (!search.trim()) return activeList.units;
    const lo = search.toLowerCase();
    return activeList.units.filter(u=>u.name.toLowerCase().includes(lo));
  }, [activeList, search]);

  // ── Render ────────────────────────────────────────────────────────────────
  return (
    <>
      <div className="app-header">
        <div className="app-title">
          ⚔ Warhammer Tracker
          <span>Army Roster &amp; Hobby Progression</span>
        </div>
        <div style={{display:'flex',gap:'0.5rem',alignItems:'center'}}>
          <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={importList}/>
          <button className="btn btn-ghost btn-sm" onClick={()=>fileRef.current.click()}>Import List</button>
          {activeList && <button className="btn btn-ghost btn-sm" onClick={exportList}>Export List</button>}
        </div>
      </div>

      <div className="main-layout">
        {/* Sidebar */}
        <div className="sidebar">
          <div className="sidebar-header">
            <h3>Army Lists</h3>
            <button className="btn btn-gold" onClick={()=>setShowNewList(true)}>+ New List</button>
          </div>
          <div className="list-scroll">
            {state.lists.length === 0 && (
              <div style={{padding:'1rem',fontSize:'0.8rem',color:'var(--text3)',textAlign:'center',lineHeight:1.6}}>
                No lists yet.<br/>Create your first army list.
              </div>
            )}
            {state.lists.map(l=>{
              const pts = l.units.reduce((s,u)=>s+u.points*u.qty,0);
              const cap = l.pointsCap||2000;
              const over = pts > cap;
              return (
                <div key={l.id} className={`list-item${l.id===state.activeId?' active':''}`}
                  onClick={()=>setActiveId(l.id)}>
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'0.25rem'}}>
                    <div className="list-item-name">{l.name}</div>
                    <button className="btn-icon danger" style={{flexShrink:0,marginTop:1}}
                      onClick={e=>{e.stopPropagation();if(confirm(`Delete "${l.name}"?`))deleteList(l.id);}}>
                      ✕
                    </button>
                  </div>
                  <div className="list-item-meta">
                    <span className={l.gameSystem==='wh40k'?'badge badge-40k':'badge badge-aos'}>
                      {l.gameSystem==='wh40k'?'40K':'AoS'}
                    </span>
                    <span>{l.factionName}</span>
                  </div>
                  <div className="list-item-meta" style={{marginTop:'0.2rem'}}>
                    <span className={`badge ${over?'badge-over':'badge-ok'}`}>{pts}/{cap} pts</span>
                    <span>{l.units.length} unit{l.units.length!==1?'s':''}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Main */}
        {!activeList ? (
          <div className="no-list main-content" style={{justifyContent:'center'}}>
            <div style={{fontSize:'3rem',opacity:0.2}}>⚔</div>
            <h2>No List Selected</h2>
            <p>Create a new army list or select one from the sidebar to begin tracking your collection.</p>
            <button className="btn btn-gold" onClick={()=>setShowNewList(true)}>Create First List</button>
          </div>
        ) : (
          <div className="main-content">
            {/* KPI bar */}
            {kpis && (
              <div className="kpi-bar">
                <div className="kpi-card">
                  <div className="kpi-label">Points</div>
                  <div className={`kpi-value ${kpis.ptsStatus==='over'?'over':kpis.ptsStatus==='warn'?'warn':''}`}>
                    {kpis.totalPts.toLocaleString()}
                    <span style={{fontSize:'0.7rem',color:'var(--text3)',marginLeft:'0.3rem'}}>/ {kpis.cap}</span>
                  </div>
                  <div className="pts-bar-wrap">
                    <div className="pts-fill-bar">
                      <div className="pts-fill-inner" style={{
                        width:`${Math.min(kpis.ptsPct,100)}%`,
                        background:ptsFillColor(kpis.ptsPct)
                      }}/>
                    </div>
                    <span style={{fontSize:'0.65rem',color:'var(--text3)'}}>{kpis.ptsPct.toFixed(0)}%</span>
                  </div>
                  {kpis.ptsStatus==='over' && <div className="kpi-sub" style={{color:'var(--red2)'}}>⚠ Over limit by {kpis.totalPts-kpis.cap}pts</div>}
                </div>
                <div className="kpi-card">
                  <div className="kpi-label">Total Models</div>
                  <div className="kpi-value">{kpis.totalModels}</div>
                  <div className="kpi-sub">{activeList.units.length} unit entr{activeList.units.length===1?'y':'ies'}</div>
                </div>
                <div className="kpi-card">
                  <div className="kpi-label">Est. Retail (CAD)</div>
                  <div className="kpi-value">{kpis.totalMsrp > 0 ? `$${kpis.totalMsrp.toFixed(0)}` : '—'}</div>
                  <div className="kpi-sub">
                    {activeList.units.filter(u=>u.msrpCAD==null).length > 0
                      ? `${activeList.units.filter(u=>u.msrpCAD==null).length} price(s) missing`
                      : 'All prices set'}
                  </div>
                </div>
                <div className="kpi-card">
                  <div className="kpi-label">Army Painted</div>
                  <div className="kpi-value" style={{color:paintColor(kpis.paintPct)}}>{kpis.paintPct.toFixed(0)}%</div>
                  <div className="prog-bar" style={{marginTop:'0.35rem'}}>
                    <div className="prog-fill" style={{width:`${kpis.paintPct}%`,background:paintColor(kpis.paintPct)}}/>
                  </div>
                </div>
              </div>
            )}

            {/* Toolbar */}
            <div className="toolbar">
              <div className="toolbar-title">
                <input value={activeList.name}
                  onChange={e=>updateListName(activeList.id, e.target.value)}
                  title="Click to rename"/>
              </div>
              <span className={activeList.gameSystem==='wh40k'?'badge badge-40k':'badge badge-aos'} style={{padding:'0.25rem 0.6rem'}}>
                {activeList.gameSystem==='wh40k'?'40K':'AoS'} · {activeList.factionName}
              </span>
              <button className="btn btn-gold btn-sm" onClick={()=>setShowAddUnit(true)}>+ Add Unit</button>
            </div>

            {/* Search */}
            {activeList.units.length > 0 && (
              <div className="search-row">
                <input className="input input-search" placeholder="Filter units…" value={search} onChange={e=>setSearch(e.target.value)}/>
                <span style={{fontSize:'0.75rem',color:'var(--text3)'}}>{filteredUnits.length} of {activeList.units.length}</span>
              </div>
            )}

            {/* Table */}
            <div className="table-wrap">
              {activeList.units.length === 0 ? (
                <div className="empty-state">
                  <div className="empty-icon">📋</div>
                  <h2>Roster is Empty</h2>
                  <p style={{color:'var(--text3)',fontSize:'0.9rem',maxWidth:300,lineHeight:1.6}}>
                    Add units from the Wahapedia database or enter them manually.
                  </p>
                  <button className="btn btn-gold" onClick={()=>setShowAddUnit(true)}>Add First Unit</button>
                </div>
              ) : (
                <table className="unit-table">
                  <thead>
                    <tr>
                      <th>Unit</th>
                      <th>Tier</th>
                      <th className="num">Qty</th>
                      <th className="num">Models</th>
                      <th className="num">Pts/Unit</th>
                      <th className="num">Total Pts</th>
                      <th className="num">MSRP</th>
                      <th className="num">Acquired</th>
                      <th className="num">Built</th>
                      <th className="num">Primed</th>
                      <th className="num">Painted</th>
                      <th className="num">Paint %</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredUnits.map(entry=>{
                      const totalModels = entry.baseModelCount * entry.qty;
                      const paintPct = totalModels > 0 ? clamp(entry.painted,0,totalModels)/totalModels*100 : 0;
                      const builtErr = entry.built > totalModels;
                      const paintedErr = entry.painted > totalModels;
                      const rowClass = builtErr || paintedErr ? 'err-row' : '';

                      function num(field, max) {
                        return (
                          <input type="number" className={`num-input${(field==='built'&&builtErr)||(field==='painted'&&paintedErr)?' err':''}`}
                            min="0" max={max} value={entry[field]}
                            onChange={e=>{
                              const v = clamp(+e.target.value,0,max);
                              updateUnit(activeList.id, entry.id, {[field]:v});
                            }}/>
                        );
                      }

                      return (
                        <tr key={entry.id} className={rowClass}>
                          <td className="td-name">
                            {entry.wahapediaUrl
                              ? <a href={entry.wahapediaUrl} target="_blank" rel="noreferrer">{entry.name}</a>
                              : entry.name}
                            <div className="td-role">{entry.role}</div>
                          </td>
                          <td>
                            {entry.tiers && entry.tiers.length > 1 ? (
                              <select className="tier-select" value={entry.tierIdx||0}
                                onChange={e=>{
                                  const i = +e.target.value;
                                  const t = entry.tiers[i];
                                  updateUnit(activeList.id, entry.id, {tierIdx:i, points:t.points, baseModelCount:t.models});
                                }}>
                                {entry.tiers.map((t,i)=><option key={i} value={i}>{t.models}m/{t.points}pts</option>)}
                              </select>
                            ) : (
                              <span style={{fontSize:'0.72rem',color:'var(--text3)'}}>{entry.baseModelCount}m</span>
                            )}
                          </td>
                          <td className="td-num">
                            <input type="number" className="num-input" min="1" max="99" value={entry.qty}
                              onChange={e=>updateUnit(activeList.id, entry.id, {qty:clamp(+e.target.value,1,99)})}/>
                          </td>
                          <td className="td-num" style={{color:'var(--text2)'}}>{totalModels}</td>
                          <td className="td-num">{entry.points}</td>
                          <td className="td-num" style={{fontWeight:600,color:'var(--gold)'}}>{entry.points*entry.qty}</td>
                          <td className="td-num">
                            {entry.msrpCAD != null
                              ? <button className="btn-icon" onClick={()=>setMsrpEntry(entry)} title="Edit price">${(entry.msrpCAD*entry.qty).toFixed(0)}</button>
                              : <button className="btn-icon" style={{fontSize:'0.65rem',color:'var(--text3)'}} onClick={()=>setMsrpEntry(entry)}>+ Price</button>
                            }
                          </td>
                          <td className="td-num">{num('acquired', 999)}</td>
                          <td className="td-num">{num('built', totalModels)}</td>
                          <td className="td-num">{num('primed', totalModels)}</td>
                          <td className="td-num">{num('painted', totalModels)}</td>
                          <td className="td-num"><PaintPct pct={paintPct}/></td>
                          <td className="td-actions">
                            <button className="btn-icon danger" onClick={()=>removeUnit(activeList.id,entry.id)} title="Remove">✕</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        )}
      </div>

      {/* Modals */}
      {showNewList && <NewListModal onSave={addList} onClose={()=>setShowNewList(false)}/>}
      {showAddUnit && activeList && <AddUnitModal list={activeList} onAdd={addUnit} onClose={()=>setShowAddUnit(false)}/>}
      {msrpEntry && (
        <MsrpModal entry={msrpEntry}
          onSave={v=>updateUnit(activeList.id, msrpEntry.id, {msrpCAD:v})}
          onClose={()=>setMsrpEntry(null)}/>
      )}
      {toast && <Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
